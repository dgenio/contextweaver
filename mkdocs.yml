site_name: contextweaver
site_url: https://dgenio.github.io/contextweaver
site_description: >-
  Phase-specific, budget-aware context engineering for tool-using AI agents.
  Minimal core dependencies. Python ≥ 3.10.

repo_url: https://github.com/dgenio/contextweaver
repo_name: dgenio/contextweaver
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            unwrap_annotated: true
            filters:
              - "!^_"
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Which pattern fits?: which_pattern.md
  - Concepts: concepts.md
  - How contextweaver Fits: interop.md
  - Cookbook: cookbook.md
  - Architectures:
      - Overview: architectures/index.md
      - Slack ops bot: architectures/slack_ops_bot.md
      - Code-review bot: architectures/code_review_bot.md
      - Voice agent: architectures/voice_agent.md
  - Gateway Spec: gateway_spec.md
  - Guides:
      - Runtime Loop: guide_agent_loop.md
      - MCP Integration: integration_mcp.md
      - A2A Integration: integration_a2a.md
      - LlamaIndex: integration_llamaindex.md
      - LangChain + LangGraph: integration_langchain.md
      - OpenAI Agents SDK: integration_openai_adk.md
      - Google ADK / Vertex AI: integration_google_adk.md
      - Pipecat: integration_pipecat.md
  - Architecture: architecture.md
  - Benchmarks: benchmarks.md
  - Troubleshooting: troubleshooting.md
  - API Reference: reference/

exclude_docs: |
  agent-context/*
  gen_ref_pages.py

not_in_nav: |
  agent-context/*
  gen_ref_pages.py

  side_effects: false
  cost_hint: 0.35
- id: logs.retention
  kind: tool
  name: logs_retention
  namespace: logs
  description: Show or change retention policy for a log stream
  tags: [logs, retention]
  side_effects: true
  cost_hint: 0.05


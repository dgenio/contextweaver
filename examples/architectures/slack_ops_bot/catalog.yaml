# Slack ops bot — ~50 internal tools (mocked, names mirror common ops surfaces).
#
# Loaded via contextweaver.routing.catalog.load_catalog_yaml(). The file is the
# canonical catalog for the architecture; main.py reads it and registers each
# entry into a Catalog before building the routing graph.
#
# Namespaces:
#   logs       — log search, log tail, ingest, retention
#   deploy     — deploy, rollback, status, freeze, promote
#   oncall     — schedule lookup, paging, escalation, ack
#   alerts     — alert silence, ack, list, mute window
#   tickets    — ticket lookup, create, update, comment, link, search
#   metrics    — metric query, dashboard, slo, error budget
#   identity   — user lookup, role lookup, group membership, audit
#   infra      — restart, scale, drain, status
#   feature    — feature flag list, set, rollout, kill switch

- id: logs.search
  kind: tool
  name: logs_search
  namespace: logs
  description: Search ingested logs across services
  tags: [logs, search]
  side_effects: false
  cost_hint: 0.30
- id: logs.tail
  kind: tool
  name: logs_tail
  namespace: logs
  description: Tail the last N lines of a service log
  tags: [logs, tail]
  side_effects: false
  cost_hint: 0.20
- id: logs.grep
  kind: tool
  name: logs_grep
  namespace: logs
  description: Run a regex grep against a log stream

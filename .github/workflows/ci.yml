name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev,langchain]"

      - name: Format check
        run: ruff format --check src/ tests/ examples/

      - name: Lint
        run: ruff check src/ tests/ examples/

      - name: Type check
        run: mypy src/

      - name: Test
        run: pytest --cov=contextweaver --cov-report=term-missing -q

      - name: Examples
        run: make example

      - name: Demo
        run: make demo

      - name: Scorecard drift check (gating)
        # Runs before the benchmark step so it validates the committed pair
        # (benchmarks/results/latest.json + benchmarks/scorecard.md). The
        # benchmark step below overwrites latest.json with this runner's
        # numbers, which would otherwise make the check non-portable.
        run: python scripts/render_scorecard.py --check

      - name: Benchmark (informational, non-gating)
        continue-on-error: true
        run: python benchmarks/benchmark.py

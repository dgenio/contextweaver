# Build and publish the official multi-arch gateway image to GHCR (issue #432).
#
# Triggers on published releases (same policy as publish.yml) and manual
# dispatch for pre-release smoke builds. Pushes:
#   ghcr.io/dgenio/contextweaver:<version>  +  :latest  (releases only)
#
# TODO(pin): this workflow references the docker/* actions by version tag.
# Repo convention (see publish.yml) is commit-SHA pinning; the session that
# authored this file could not resolve upstream SHAs. Replace each
# `@vN` with the corresponding commit SHA before enabling on a release.

name: docker-publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3 # TODO(pin): replace with commit SHA

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # TODO(pin): replace with commit SHA

      - name: Log in to GHCR
        uses: docker/login-action@v3 # TODO(pin): replace with commit SHA
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5 # TODO(pin): replace with commit SHA
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=contextweaver MCP gateway
            org.opencontainers.image.description=MCP gateway: bounded tool shortlists + artifact-backed result firewall. Deterministic, no model.
            org.opencontainers.image.licenses=MIT
            io.modelcontextprotocol.server.name=io.github.dgenio/contextweaver

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6 # TODO(pin): replace with commit SHA
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true

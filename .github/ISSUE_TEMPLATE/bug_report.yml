name: Bug Report
description: Report a reproducible defect in contextweaver.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or sequence of steps that reliably triggers the bug.
      placeholder: |
        1. Import …
        2. Call …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include full tracebacks when relevant.
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.8"
    validations:
      required: true

  - type: input
    id: cw_version
    attributes:
      label: contextweaver version
      placeholder: "e.g. 0.1.4  (run: python -c 'import contextweaver; print(contextweaver.__version__)')"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant (OS, virtual-env tool, related issues, etc.).

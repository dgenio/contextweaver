<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320" role="img" aria-label="Before vs after token comparison — 417 raw tokens without contextweaver, 126 tokens with contextweaver">
  <title>contextweaver — before vs after token comparison</title>
  <desc>Captured output of `python examples/before_after.py`. Without contextweaver: 417 raw prompt tokens, naive concatenation, no budget. With contextweaver: 126 final prompt tokens, phase-aware + firewall, 1500-token budget. Result: 70 percent reduction, 291 tokens saved, budget compliant.</desc>

  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7d2828"/>
      <stop offset="1" stop-color="#da3633"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c6e38"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" rx="14" fill="url(#bgGrad2)"/>

  <!-- Heading -->
  <text x="480" y="38" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#c9d1d9">Before vs After — same agent, same tool result</text>
  <text x="480" y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#8b949e">captured from <tspan font-family="ui-monospace, monospace" fill="#79c0ff">examples/before_after.py</tspan></text>

  <!-- WITHOUT (top row) -->
  <g>
    <text x="40" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#f0883e">WITHOUT contextweaver</text>
    <text x="40" y="120" font-family="ui-monospace, monospace" font-size="11" fill="#8b949e">naive concatenation · no budget · raw output verbatim</text>
    <rect x="40" y="132" width="880" height="22" rx="4" fill="#21262d"/>
    <rect x="40" y="132" width="880" height="22" rx="4" fill="url(#redBar)"/>
    <text x="55" y="148" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#ffffff">417 raw prompt tokens</text>
    <text x="905" y="148" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#ffd7c4">100 %</text>
  </g>

  <!-- WITH (bottom row) -->
  <g>
    <text x="40" y="190" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#3fb950">WITH contextweaver</text>
    <text x="40" y="210" font-family="ui-monospace, monospace" font-size="11" fill="#8b949e">phase-aware + firewall · 1500-token budget · summary + artifact ref</text>
    <rect x="40" y="222" width="880" height="22" rx="4" fill="#21262d"/>
    <rect x="40" y="222" width="266" height="22" rx="4" fill="url(#greenBar)"/>
    <text x="55" y="238" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#ffffff">126 final prompt tokens</text>
    <text x="905" y="238" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#c4f1c9">30 %</text>
  </g>

  <!-- Result row -->
  <g>
    <rect x="40" y="266" width="880" height="38" rx="6" fill="#161b22" stroke="#30363d"/>
    <text x="480" y="290" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#c9d1d9"><tspan fill="#3fb950" font-weight="700">70 % reduction</tspan> · <tspan fill="#c9d1d9">291 tokens saved</tspan> · <tspan fill="#3fb950">budget compliant</tspan> · <tspan fill="#8b949e">8 items included, 0 dropped</tspan></text>
  </g>
</svg>

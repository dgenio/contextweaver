repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  # Keep rev aligned with the ruff version used in development (see pyproject.toml [project.optional-dependencies] dev).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.8
    hooks:
      - id: ruff-format
        args: [--config, pyproject.toml]
      - id: ruff
        args: [--fix, --config, pyproject.toml]

  # Regenerate llms.txt / llms-full.txt whenever a source doc (or the generator)
  # changes, so the committed copies never drift from the docs. This is the
  # local, auto-fixing mirror of CI's gating `make llms-check`: if the hook
  # rewrites either file, pre-commit reports the change and the commit must be
  # re-staged (same flow as ruff-format above). Sources are the docs listed in
  # scripts/gen_llms.py (README.md + docs/**/*.md).
  - repo: local
    hooks:
      - id: llms-drift
        name: regenerate llms.txt / llms-full.txt from docs
        entry: python scripts/gen_llms.py
        language: system
        pass_filenames: false
        files: ^(README\.md|docs/.*\.md|scripts/gen_llms\.py)$
